<svg viewBox="0 0 1600 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eef1f5"/>
      <stop offset="100%" stop-color="#e5e5ea"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="480" fill="url(#sky)"/>

  <!-- ground -->
  <rect x="0" y="400" width="1600" height="80" fill="#dde1e6"/>
  <rect x="0" y="400" width="1600" height="6" fill="#cfd4da"/>

  <!-- bush -->
  <circle cx="1180" cy="392" r="34" fill="#cfe3d6"/>
  <circle cx="1220" cy="400" r="26" fill="#cfe3d6"/>
  <circle cx="1150" cy="402" r="22" fill="#cfe3d6"/>

  <!-- walkway -->
  <polygon points="740,400 860,400 830,470 700,470" fill="#eceff2"/>

  <!-- house body -->
  <rect x="560" y="220" width="360" height="180" rx="6" fill="#ffffff" stroke="#d2d2d7" stroke-width="2"/>

  <!-- roof -->
  <polygon points="540,220 740,100 940,220" fill="#0071e3"/>
  <polygon points="540,220 740,100 740,220" fill="#2b8aec"/>

  <!-- chimney -->
  <rect x="850" y="130" width="28" height="70" fill="#b9c2cc"/>

  <!-- door -->
  <rect x="710" y="300" width="60" height="100" rx="4" fill="#0071e3"/>
  <circle cx="758" cy="352" r="3.5" fill="#eef1f5"/>

  <!-- windows -->
  <g fill="#dceaff" stroke="#0071e3" stroke-width="3">
    <rect x="600" y="260" width="60" height="60" rx="3"/>
    <rect x="820" y="260" width="60" height="60" rx="3"/>
  </g>
  <g stroke="#0071e3" stroke-width="2">
    <line x1="630" y1="260" x2="630" y2="320"/>
    <line x1="600" y1="290" x2="660" y2="290"/>
    <line x1="850" y1="260" x2="850" y2="320"/>
    <line x1="820" y1="290" x2="880" y2="290"/>
  </g>

  <!-- person -->
  <g>
    <circle cx="980" cy="300" r="22" fill="#8e97a3"/>
    <path d="M940 400 C940 350 1020 350 1020 400 L1020 400 L940 400 Z" fill="#8e97a3"/>
    <rect x="946" y="330" width="68" height="90" rx="14" fill="#aeb6c0"/>

    <!-- tablet -->
    <rect x="958" y="345" width="44" height="58" rx="5" fill="#ffffff" stroke="#0071e3" stroke-width="2.5"/>
    <rect x="965" y="354" width="30" height="5" rx="2.5" fill="#0071e3"/>
    <rect x="965" y="364" width="22" height="5" rx="2.5" fill="#bcdcff"/>
    <rect x="965" y="374" width="26" height="5" rx="2.5" fill="#bcdcff"/>
    <circle cx="988" cy="388" r="4" fill="#34c759"/>
  </g>
</svg>
